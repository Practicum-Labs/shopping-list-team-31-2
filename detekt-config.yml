# Общее поведение сборки при наличии нарушений
build:
  # максимально допустимое количество нарушений
  maxIssues: 100500 # Это нужно, чтобы не упасть сразу после прогона detekt-а, а дождаться остальных утилит.
  # учитывать ли нарушения, которые можно исправить автоматически
  excludeCorrectable: false
  # приоритет категорий сложности
  weights:
  # complexity: 2
  # LongParameterList: 1
  # style: 1
  # comments: 1

# Общая конфигурация Detekt
config:
  # режим строгой валидации конфигурационного файла при запуске (проверка на ошибки в данном файле)
  validation: true
  # определение важности ошибок (true - все ошибки являются критическими)
  warningsAsErrors: false
  # регулярные выражения для отключения валидации пользовательских свойств в собственных правилах
  # when writing own rules with new properties, exclude the property path e.g.: 'my_rule_set,.*>.*>[my_property]'
  excludes: ''

# Модули, которые собирают дополнительную статистику о проекте во время анализа
processors:
  # Включает использование процессоров для статистики
  active: true
  # Список процессоров, которые нужно отключить (для отключение указать #)
  exclude:
    - 'DetektProgressListener'
  # - 'KtFileCountProcessor'
  # - 'PackageCountProcessor'
  # - 'ClassCountProcessor'
  # - 'FunctionCountProcessor'
  # - 'PropertyCountProcessor'
  # - 'ProjectComplexityProcessor'
  # - 'ProjectCognitiveComplexityProcessor'
  # - 'ProjectLLOCProcessor'
  # - 'ProjectCLOCProcessor'
  # - 'ProjectLOCProcessor'
  # - 'ProjectSLOCProcessor'
  # - 'LicenseHeaderLoaderExtension'

# Управление отчетами, которые выводятся в консоль
console-reports:
  active: true
  exclude: [ ]

# Генерация отчетов в отдельные файлы
output-reports:
  active: true
  exclude: [ ]

complexity:
  # Лимит на количество строк кода внутри тела функции
  functionBodyLength:
    threshold: 50

  # Лимит на количество параметров функции
  longParameterList:
    maxParameters: 6

  # Лимит на размер класса (количество строк во всем классе)
  largeClass:
    threshold: 350